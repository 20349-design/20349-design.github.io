<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Login Sederhana</title>
    <style>
        :root {
            --bg-start: #1f1722;
            --bg-end: #fec5c6;
            --card: rgba(240, 180, 180, 0.92);
            --text: #1a141d;
            --muted: #3a2a3f;
            --primary: #f472b6;
            --primary-hover: #ec4899;
            --success: #3a1f2d;
            --danger: #fbcfe8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 24%),
                        linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            width: min(420px, 100%);
            padding: 36px 32px;
            background: var(--card);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 28px 80px rgba(20, 20, 60, 0.16);
            backdrop-filter: blur(14px);
        }

        h2 {
            margin: 0 0 10px;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 0.04em;
        }

        .field-group {
            display: grid;
            gap: 14px;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(100, 100, 130, 0.18);
            background: #fff;
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: rgba(94, 114, 255, 0.6);
            box-shadow: 0 0 0 4px rgba(94, 114, 255, 0.12);
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: none;
            color: white;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            cursor: pointer;
            box-shadow: 0 16px 32px rgba(94, 114, 255, 0.24);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        button:active {
            transform: translateY(0);
        }

        #hasil {
            margin-top: 18px;
            min-height: 26px;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 360px) {
            .login-box {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>
    <div class="field-group">
        <input type="text" id="username" placeholder="Masukkan Username" autocomplete="username">
        <input type="password" id="password" placeholder="Masukkan Password" autocomplete="current-password">
    </div>
    <button onclick="cekLogin()">Login</button>
    <div id="hasil"></div>
</div>

<script>
    function cekLogin() {
        const userBenar = "airin";
        const passBenar = "12345";

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const hasil = document.getElementById("hasil");

        if (!username || !password) {
            hasil.style.color = "#d97706";
            hasil.innerHTML = "Isi username dan password terlebih dahulu.";
            return;
        }

        if (username === userBenar && password === passBenar) {
            hasil.style.color = "var(--success)";
            hasil.innerHTML = "Login berhasil ✅ Selamat datang, " + username + "!";
        } else {
            hasil.style.color = "var(--danger)";
            hasil.innerHTML = "Username atau password salah ❌";
        }
    }
</script>

</body>
</html>
